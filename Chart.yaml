apiVersion: v2
name: polytope-server
description: >
  Polytope data retrieval server backed by the BITS routing engine.
  Deploys the polytope-server frontend (broker), dynamic worker pools,
  and NATS JetStream persistence.
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
  - name: nats
    version: 2.12.4
    repository: https://nats-io.github.io/k8s/helm/charts/
    condition: nats.enabled
  - name: bobs
    version: 0.1.0
    repository: file://charts/bobs
    condition: bobs.enabled
  - name: auth-o-tron-chart
    version: 0.1.8
    repository: oci://eccr.ecmwf.int/auth-o-tron
    condition: auth-o-tron.enabled
    alias: auth-o-tron
