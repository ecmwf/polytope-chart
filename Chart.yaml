apiVersion: v2
name: polytope-server
description: >
  Polytope data retrieval server backed by the BITS routing engine.
  Deploys the polytope-server frontend (broker), dynamic worker pools,
  and TiKV persistence (raw StatefulSets — no operator required).
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
  - name: bobs
    version: "0.1.0"
    repository: "file://../bobs/chart"
    condition: bobs.enabled
  - name: mysql
    version: 10.2.2
    repository: https://charts.bitnami.com/bitnami
    condition: mysql.enabled
  - name: seaweedfs
    version: 3.67.0
    repository: https://seaweedfs.github.io/seaweedfs/helm
    condition: seaweedfs.enabled
