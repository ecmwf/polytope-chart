replicaCount: 1

imagePullSecrets: []

image:
  repository: bobs
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000

resources: {}

config:
  host: "0.0.0.0"
  port: 3000
  data_dir: "/var/lib/bobs"
  page_size: 4096
  max_cache_bytes: 1048576
  writer_inactivity_timeout_secs: 300
  read_idle_ttl_secs: 600
  full_read_complete_ttl_secs: 30
  reader_done_ttl_secs: 60
  unread_ttl_secs: 3600
  cleanup_sweep_interval_secs: 30
  long_poll_timeout_ms: 25000
  host_prefix: ""
  domain: ""
  route_name: "download"

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""

ingress:
  enabled: false
  className: nginx
  annotations: {}
  tls: []

headlessService:
  enabled: true
  name: bobs-svc
