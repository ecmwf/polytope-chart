{{- range $name, $pool := .Values.workerPools }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-{{ $name }}
  labels:
    {{- include "polytope-server.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  replicas: {{ $pool.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "polytope-server.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      annotations:
        {{- if $pool.config }}
        checksum/worker-config: {{ toYaml $pool.config | sha256sum }}
        {{- end }}
        {{- with $pool.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "polytope-server.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $name }}
        app: worker-{{ $name }}
    spec:
      {{- if $pool.hostNetwork }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.image.registry }}/{{ $pool.image }}:{{ $.Values.image.tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          args:
            - --broker-url
            - {{ include "polytope-server.workerBrokerUrl" (dict "root" $ "pool" ($pool.pool | default "worker_pool")) | quote }}
            {{- range $pool.args }}
            - {{ . | quote }}
            {{- end }}
          env:
            - name: RUST_LOG
              value: info
            {{- if $pool.hostNetwork }}
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- end }}
            {{- if $pool.marsConfig }}
            - name: MARS_HOME
              value: /mars-home
            {{- end }}
            {{- with $pool.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with $pool.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or $pool.config $pool.marsConfig $pool.cacheDir }}
          volumeMounts:
            {{- if $pool.config }}
            - name: config
              mountPath: /etc/worker/config.yaml
              subPath: config.yaml
            {{- end }}
            {{- if $pool.marsConfig }}
            - name: mars-config
              mountPath: /mars-home/etc/mars-client
            {{- end }}
            {{- if $pool.cacheDir }}
            - name: cache
              mountPath: /tmp/cache
            {{- end }}
          {{- end }}
      {{- if or $pool.config $pool.marsConfig $pool.cacheDir }}
      volumes:
        {{- if $pool.config }}
        - name: config
          configMap:
            name: worker-{{ $name }}-config
        {{- end }}
        {{- if $pool.marsConfig }}
        - name: mars-config
          configMap:
            name: worker-{{ $name }}-mars-config
        {{- end }}
        {{- if $pool.cacheDir }}
        - name: cache
          hostPath:
            path: {{ $pool.cacheDir }}
            type: DirectoryOrCreate
        {{- end }}
      {{- end }}
{{- end }}
