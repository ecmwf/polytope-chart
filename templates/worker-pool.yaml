{{- range $name, $pool := .Values.workerPools }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-{{ $name }}
  labels:
    {{- include "polytope-server.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  replicas: {{ $pool.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "polytope-server.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      annotations:
        {{- if $pool.config }}
        checksum/worker-config: {{ toYaml $pool.config | sha256sum }}
        {{- end }}
        {{- if $pool.deliveryConfig }}
        checksum/delivery-config: {{ toYaml $pool.deliveryConfig | sha256sum }}
        {{- end }}
        {{- with $pool.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "polytope-server.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $name }}
        app: worker-{{ $name }}
    spec:
      terminationGracePeriodSeconds: {{ $pool.terminationGracePeriodSeconds | default 30 }}
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $pool.marsConfig }}
      serviceAccountName: mars-worker
      {{- end }}
      containers:
        - name: {{ $name }}
          image: {{ include "polytope-server.image" (dict "imageRoot" $pool.image "global" $.Values.global "chart" $.Chart) | quote }}
          imagePullPolicy: {{ $pool.image.pullPolicy | default "Always" }}
          args:
            - --broker-url
            - {{ include "polytope-server.workerBrokerUrl" (dict "root" $ "pool" ($pool.pool | default "worker_pool")) | quote }}
            {{- range $pool.args }}
            - {{ . | quote }}
            {{- end }}
            {{- if $pool.deliveryConfig }}
            - --delivery-config-path
            - /etc/worker/delivery.yaml
            {{- end }}
          env:
            - name: RUST_LOG
              value: info
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if $pool.marsConfig }}
            - name: MARS_HOME
              value: /mars-home
            {{- end }}
            {{- with $pool.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with $pool.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or $pool.config $pool.marsConfig $pool.cacheDir $pool.deliveryConfig }}
          volumeMounts:
            {{- if $pool.config }}
            - name: config
              mountPath: /etc/worker/config.yaml
              subPath: config.yaml
            {{- end }}
            {{- if $pool.marsConfig }}
            - name: mars-config
              mountPath: /mars-home/etc/mars-client
            {{- end }}
            {{- if $pool.cacheDir }}
            - name: cache
              mountPath: /tmp/cache
            {{- end }}
            {{- if $pool.deliveryConfig }}
            - name: delivery-config
              mountPath: /etc/worker/delivery.yaml
              subPath: delivery.yaml
            {{- end }}
          {{- end }}
      {{- if or $pool.config $pool.marsConfig $pool.cacheDir $pool.deliveryConfig }}
      volumes:
        {{- if $pool.config }}
        - name: config
          configMap:
            name: worker-{{ $name }}-config
        {{- end }}
        {{- if $pool.marsConfig }}
        - name: mars-config
          configMap:
            name: worker-{{ $name }}-mars-config
        {{- end }}
        {{- if $pool.cacheDir }}
        - name: cache
          hostPath:
            path: {{ $pool.cacheDir }}
            type: DirectoryOrCreate
        {{- end }}
        {{- if $pool.deliveryConfig }}
        - name: delivery-config
          configMap:
            name: worker-{{ $name }}-delivery-config
        {{- end }}
      {{- end }}
{{- end }}
