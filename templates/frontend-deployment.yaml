apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "polytope-server.fullname" . }}-frontend
  labels:
    {{- include "polytope-server.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      {{- include "polytope-server.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.frontend.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "polytope-server.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
        app: frontend
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.nats.enabled }}
      # Block until NATS is healthy to avoid crash-loop backoff on the
      # frontend, which fails immediately if persistence is unreachable.
      initContainers:
        - name: wait-for-nats
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-nats 4222; do sleep 1; done']
      {{- end }}
      containers:
        - name: polytope-server
          image: {{ include "polytope-server.image" (dict "imageRoot" .Values.frontend.image "global" .Values.global "chart" .Chart) | quote }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy | default "Always" }}
          args:
            - /etc/polytope/config.yaml
          ports:
            - name: http
              containerPort: {{ .Values.frontend.port }}
              protocol: TCP
            - name: broker
              containerPort: {{ .Values.frontend.brokerPort }}
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v2/health
              port: http
            initialDelaySeconds: 1
            periodSeconds: 2
            failureThreshold: 5
          env:
            - name: RUST_LOG
              value: info
            {{- with .Values.authentication }}
            {{- if .secretName }}
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName }}
                  key: {{ .secretKey | default "auth-secret" }}
            {{- end }}
            {{- end }}
          {{- with .Values.frontend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/polytope/config.yaml
              subPath: config.yaml
            {{- if .Values.schedule }}
            - name: schedule
              mountPath: /etc/polytope/schedule.xml
              subPath: schedule.xml
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "polytope-server.fullname" . }}-config
        {{- if .Values.schedule }}
        - name: schedule
          configMap:
            name: {{ include "polytope-server.fullname" . }}-schedule
        {{- end }}
