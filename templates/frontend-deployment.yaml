apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "polytope-server.fullname" . }}-frontend
  labels:
    {{- include "polytope-server.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      {{- include "polytope-server.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.frontend.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "polytope-server.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
        app: frontend
    spec:
      {{- include "polytope-server.imagePullSecrets" . | nindent 6 }}
      {{- if or .Values.nats.enabled .Values.schedule }}
      initContainers:
        {{- if .Values.nats.enabled }}
        # Block until NATS is healthy to avoid crash-loop backoff on the
        # frontend, which fails immediately if persistence is unreachable.
        - name: wait-for-nats
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-nats 4222; do sleep 1; done']
        {{- end }}
        {{- if .Values.schedule }}
        - name: fetch-schedule
          image: alpine/git:2.47.2
          command:
            - sh
            - -c
            - |
              mkdir -p ~/.ssh
              cp /ssh-key/ssh-privatekey ~/.ssh/id_ed25519
              chmod 600 ~/.ssh/id_ed25519
              printf 'Host github.com\n  HostName ssh.github.com\n  Port 443\n  User git\n' > ~/.ssh/config
              ssh-keyscan -p 443 ssh.github.com >> ~/.ssh/known_hosts 2>/dev/null
              git clone --depth 1 --branch {{ .Values.schedule.branch | default "develop" }} {{ .Values.schedule.repo | quote }} /tmp/repo
              cp /tmp/repo/{{ .Values.schedule.path }} /schedule/schedule.xml
          volumeMounts:
            - name: schedule
              mountPath: /schedule
            - name: schedule-ssh
              mountPath: /ssh-key
              readOnly: true
        {{- end }}
      {{- end }}
      containers:
        - name: polytope-server
          image: {{ include "polytope-server.image" (dict "imageRoot" .Values.frontend.image "global" .Values.global "chart" .Chart) | quote }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy | default "Always" }}
          args:
            - /etc/polytope/config.yaml
          ports:
            - name: http
              containerPort: {{ .Values.frontend.port }}
              protocol: TCP
            - name: broker
              containerPort: {{ .Values.frontend.brokerPort }}
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v2/health
              port: http
            initialDelaySeconds: 1
            periodSeconds: 2
            failureThreshold: 5
          env:
            - name: RUST_LOG
              value: info
            {{- with .Values.authentication }}
            {{- if .secretName }}
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName }}
                  key: {{ .secretKey | default "auth-secret" }}
            {{- end }}
            {{- end }}
          {{- with .Values.frontend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/polytope/config.yaml
              subPath: config.yaml
            {{- if .Values.schedule }}
            - name: schedule
              mountPath: /etc/polytope/schedule.xml
              subPath: schedule.xml
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "polytope-server.fullname" . }}-config
        {{- if .Values.schedule }}
        - name: schedule
          emptyDir: {}
        - name: schedule-ssh
          secret:
            secretName: {{ .Values.schedule.sshSecretName }}
            defaultMode: 0400
        {{- end }}
