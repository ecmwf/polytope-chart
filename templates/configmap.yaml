{{- $site := required "polytope.site is required and must be a lowercase alphanumeric tag of 1-3 characters" .Values.polytope.site -}}
{{- $env := required "polytope.env is required and must be a lowercase alphanumeric tag of 1-3 characters" .Values.polytope.env -}}
{{- if not (regexMatch "^[a-z0-9]{1,3}$" $site) -}}
{{- fail "polytope.site must be a lowercase alphanumeric tag of 1-3 characters" -}}
{{- end -}}
{{- if not (regexMatch "^[a-z0-9]{1,3}$" $env) -}}
{{- fail "polytope.env must be a lowercase alphanumeric tag of 1-3 characters" -}}
{{- end -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "polytope-server.fullname" . }}-config
  labels:
    {{- include "polytope-server.labels" . | nindent 4 }}
data:
  config.yaml: |
    polytope:
      site: {{ $site | quote }}
      env: {{ $env | quote }}
    server:
      host: {{ .Values.frontend.host | default "0.0.0.0" | quote }}
      port: {{ .Values.frontend.port | default 3000 }}
      {{- with .Values.frontend.retry_after_secs }}
      retry_after_secs: {{ . }}
      {{- end }}
    bits:
      bits:
        {{- with .Values.frontend.max_jobs }}
        max_jobs: {{ . }}
        {{- end }}
        {{- if .Values.nats.enabled }}
        persistence:
          type: nats
          url: {{ include "polytope-server.natsUrl" . | quote }}
          broker_lease_ttl_secs: 30
          {{- with .Values.frontend.nats_connect_timeout_secs }}
          connect_timeout_secs: {{ . }}
          {{- end }}
          {{- with .Values.frontend.nats_init_max_attempts }}
          init_max_attempts: {{ . }}
          {{- end }}
        {{- end }}
        internal_poll_endpoint: {{ include "polytope-server.pollBaseUrl" . | quote }}
        persist_after_secs: {{ .Values.frontend.persist_after_secs | default 10 }}
        worker_server:
          host: "0.0.0.0"
          port: {{ .Values.frontend.brokerPort | default 9001 }}
      {{- with .Values.broker.targets }}
      targets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.broker.routes }}
      routes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.broker.collections }}
      collections:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.broker.checks .Values.schedule }}
      checks:
        {{- if .Values.broker.checks }}
        {{- range $name, $check := .Values.broker.checks }}
        {{- if and (eq $name "schedule_released") $.Values.schedule }}
        {{ $name }}:
          type: schedule_released
          path: /etc/polytope/schedule.xml
          {{- with $check.now_rfc3339 }}
          now_rfc3339: {{ . | quote }}
          {{- end }}
        {{- else }}
        {{ $name }}:
          {{- toYaml $check | nindent 10 }}
        {{- end }}
        {{- end }}
        {{- else if .Values.schedule }}
        schedule_released:
          type: schedule_released
          path: /etc/polytope/schedule.xml
        {{- end }}
      {{- end }}
      {{- with .Values.broker.transforms }}
      transforms:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- with .Values.edr }}
    edr:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.frontend.admin_bypass_roles }}
    admin_bypass_roles:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- if or .Values.authentication (index .Values "auth-o-tron" "enabled") }}
    authentication:
      url: {{ (.Values.authentication).url | default (printf "http://%s-auth-o-tron:%v" .Release.Name ((index .Values "auth-o-tron" "service" "port") | default 8080)) | quote }}
      {{- if not ((.Values.authentication).secretName) }}
      secret: {{ ((.Values.authentication).secret) | default (index .Values "auth-o-tron" "config" "jwt" "secret") | quote }}
      {{- end }}
      {{- with ((.Values.authentication).timeout_ms) | default 3000 }}
      timeout_ms: {{ . }}
      {{- end }}
      {{- with ((.Values.authentication).allow_anonymous) }}
      allow_anonymous: {{ . }}
      {{- end }}
    {{- end }}
