apiVersion: v1
kind: ConfigMap
metadata:
  name: config
  labels:
    {{- include "polytope-server.labels" . | nindent 4 }}
data:
  config.yaml: |
    server:
      host: {{ .Values.frontend.host | default "0.0.0.0" | quote }}
      port: {{ .Values.frontend.port | default 3000 }}
    bits:
      bits:
        {{- if .Values.tikv.enabled }}
        tikv:
          endpoints:
            - {{ include "polytope-server.pdEndpoint" . | quote }}
          broker_lease_ttl_secs: 30
        {{- end }}
        internal_poll_base_url: {{ include "polytope-server.pollBaseUrl" . | quote }}
        persist_after_ms: {{ .Values.frontend.persist_after_ms | default 10000 }}
        poll_timeout_ms: {{ .Values.frontend.poll_timeout_ms | default 30000 }}
        persist_guard_ms: {{ .Values.frontend.persist_guard_ms | default 1000 }}
        worker_server:
          host: "0.0.0.0"
          port: {{ .Values.frontend.brokerPort | default 9001 }}
      {{- with .Values.broker.targets }}
      targets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.broker.routes }}
      routes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.broker.checks .Values.schedule.url }}
      checks:
        {{- if .Values.broker.checks }}
        {{- range $name, $check := .Values.broker.checks }}
        {{- $scheduleType := eq (default "" (index (default dict $check) "type")) "schedule_released" }}
        {{- if and (or (eq $name "schedule_released") $scheduleType) $.Values.schedule.url }}
        {{ $name }}:
          type: schedule_released
          url: {{ $.Values.schedule.url | quote }}
          {{- if not $.Values.schedule.secretName }}
          token: {{ $.Values.schedule.token | quote }}
          {{- end }}
          {{- with (index (default dict $check) "now_rfc3339") }}
          now_rfc3339: {{ . | quote }}
          {{- end }}
        {{- else }}
        {{ $name }}:
          {{- toYaml $check | nindent 10 }}
        {{- end }}
        {{- end }}
        {{- else if .Values.schedule.url }}
        schedule_released:
          type: schedule_released
          url: {{ .Values.schedule.url | quote }}
          {{- if not .Values.schedule.secretName }}
          token: {{ .Values.schedule.token | quote }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- with .Values.broker.transforms }}
      transforms:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- with .Values.edr }}
    edr:
      {{- toYaml . | nindent 6 }}
    {{- end }}
