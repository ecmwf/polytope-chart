{{- range $name, $pool := .Values.workerPools }}
{{- if or $pool.config $pool.deliveryConfig }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: worker-{{ $name }}-config
  labels:
    {{- include "polytope-server.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
data:
  config.yaml: |
    {{- $cfg := dict }}
    {{- if $pool.config }}
    {{- $cfg = deepCopy $pool.config }}
    {{- end }}
    {{- if $pool.deliveryConfig }}
    {{- $delivery := deepCopy $pool.deliveryConfig }}
    {{- if and (eq (default "" $delivery.delivery_type) "bobs") (not $delivery.bobs_url) }}
    {{- $_ := set $delivery "bobs_url" (printf "%s:%d" $.Values.bobs.headlessService.name (int $.Values.bobs.service.port)) }}
    {{- end }}
    {{- $_ := set $cfg "delivery" $delivery }}
    {{- end }}
    {{- toYaml $cfg | nindent 4 }}
{{- end }}
{{- if $pool.marsConfig }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: worker-{{ $name }}-mars-config
  labels:
    {{- include "polytope-server.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
data:
  databases.yaml: |
    {{- toYaml $pool.marsConfig.databases | nindent 4 }}
  {{- if $pool.marsConfig.config }}
  config.yaml: |
    {{- toYaml $pool.marsConfig.config | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
