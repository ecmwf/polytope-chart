{{- if and .Values.ingress.enabled .Values.ingress.domain }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "polytope-server.fullname" . }}
  labels:
    {{- include "polytope-server.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ include "polytope-server.ingressHost" . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "polytope-server.fullname" . }}-frontend
                port:
                  name: http
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - secretName: {{ .secretName }}
      hosts:
        - {{ include "polytope-server.ingressHost" $ | quote }}
    {{- end }}
  {{- end }}
{{- end }}
