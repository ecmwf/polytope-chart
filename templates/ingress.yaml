{{- if and .Values.ingress.enabled .Values.ingress.domain }}
{{- $host := include "polytope-server.ingressHost" . }}
{{- $annotations := .Values.ingress.annotations | default dict }}
{{- $hasCertManager := or (hasKey $annotations "cert-manager.io/cluster-issuer") (hasKey $annotations "cert-manager.io/issuer") }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: polytope-ingress
  labels:
    {{- include "polytope-server.labels" . | nindent 4 }}
  annotations:
    dns.operators.ecmwf.int/on-transport-server: vs-transport-https
    {{- with $annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if .Values.bobs.enabled }}
    nginx.org/server-snippets: |
      location ~ ^/download-(\d+)/([^/]+)$ {
        proxy_pass http://bobs-$1.{{ .Values.bobs.headlessService.name }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.bobs.service.port }}/read/$2;
      }
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  name: http
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - secretName: {{ .secretName }}
      hosts:
        - {{ $host | quote }}
    {{- end }}
  {{- else if $hasCertManager }}
  tls:
    - secretName: ingress-tls
      hosts:
        - {{ $host | quote }}
  {{- end }}
{{- end }}
