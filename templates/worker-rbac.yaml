apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "polytope-server.fullname" . }}-mars-service-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "polytope-server.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "polytope-server.fullname" . }}-mars-service-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "polytope-server.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "polytope-server.fullname" . }}-mars-service-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "polytope-server.fullname" . }}-mars-worker
    namespace: {{ .Release.Namespace }}
