{{- if .Values.global.imageCredentials }}
{{- with .Values.global.imageCredentials }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "polytope-server.fullname" $ }}-registry-cred
  labels:
    {{- include "polytope-server.labels" $ | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf "{\"auths\":{\"%s\":{\"auth\":\"%s\"}}}" .registry (printf "%s:%s" .username .password | b64enc) | b64enc }}
{{- end }}
{{- end }}
