{{- if .Values.fdbWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "polytope-server.fullname" . }}-fdb-worker
  labels:
    {{- include "polytope-server.labels" . | nindent 4 }}
    app.kubernetes.io/component: fdb-worker
spec:
  replicas: {{ .Values.fdbWorker.replicas }}
  selector:
    matchLabels:
      {{- include "polytope-server.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: fdb-worker
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "polytope-server.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: fdb-worker
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: fdb-worker
          image: "{{ .Values.image.registry }}/fdb-worker:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --broker-url
            - "http://{{ include "polytope-server.fullname" . }}-frontend.{{ .Release.Namespace }}.svc:{{ .Values.frontend.brokerPort }}"
            - --fdb-config-path
            - "{{ .Values.fdbWorker.fdbConfigPath }}"
          env:
            - name: RUST_LOG
              value: info
          {{- if .Values.fdbConfig }}
          volumeMounts:
            - name: fdb-config
              mountPath: /etc/fdb/fdb.yaml
              subPath: fdb.yaml
          {{- end }}
      {{- if .Values.fdbConfig }}
      volumes:
        - name: fdb-config
          configMap:
            name: {{ include "polytope-server.fullname" . }}-fdb-config
      {{- end }}
{{- end }}
