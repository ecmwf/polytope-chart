nameOverride: ""
fullnameOverride: ""

global:
  # Override ALL image registries in the chart (e.g. for air-gapped environments).
  imageRegistry: ""
  # Pull secrets propagated to all pods, including subcharts (bobs, etc.).
  imagePullSecrets: []
  # When set, the chart creates a kubernetes.io/dockerconfigjson Secret and
  # automatically adds it to imagePullSecrets on every pod (including subcharts).
  imageCredentials: {}
    # registry: eccr.ecmwf.int
    # username: robot$polytope+polytope-pull
    # password: changeme

# Additional pull secrets for the parent chart only (merged with global).
imagePullSecrets: []

# ── Polytope identity ─────────────────────────────────────────────────────────
# Stable 1-3 character lowercase alphanumeric tags used in persisted request IDs.
# Set explicitly from deployment values; these are not inferred from Kubernetes.
polytope:
  site: ""
  env: ""

# ── Frontend (broker) ─────────────────────────────────────────────────────────
frontend:
  image:
    repository: polytope-server
    tag: ""
    pullPolicy: Always
  host: "0.0.0.0"
  port: 3000
  brokerPort: 9001
  replicas: 1
  persist_after_secs: 10
  # max_jobs: 500000              # Broker-wide job limit (OOM protection, default 500000)
  # retry_after_secs: 5           # Retry-After header on 529 overload responses
  # nats_connect_timeout_secs: 10 # NATS persistence connection timeout per attempt
  # nats_init_max_attempts: 6     # NATS init retry attempts (exponential backoff)
  resources: {}
  podAnnotations: {}

# ── Broker ────────────────────────────────────────────────────────────────────
# Targets, routes, checks, and transforms for the bits routing engine.
# persistence and internal_poll_endpoint are injected by the chart.
broker:
  targets:
    worker_pool:
      type: remote
      dispatcher:
        queue: cost_weighted
        # queue_capacity: 500000    # Per-dispatcher queue bound (default 500000)
        executor:
          type: remote_pool
          heartbeat_timeout_secs: 60
  routes:
    - default:
        - target::worker_pool

# ── Schedule ──────────────────────────────────────────────────────────────────
# Schedule XML for the schedule_released check.
# When set, an init container clones the repo via SSH and mounts the file.
#   repo: SSH git URL (e.g. git@github.com:org/repo.git)
#   branch: branch to clone (default: "develop")
#   path: path to the schedule XML within the repo
#   sshSecretName: k8s Secret containing an SSH deploy key
schedule: {}

# ── Worker pools ──────────────────────────────────────────────────────────────
# Each key produces a Deployment (+ optional ConfigMap when config is set).
# The chart handles mounting and CLI args internally.
# `pool` is the broker target name — workers connect to /pool/work on the broker.
#
# workerPools:
#   fdb-alps:
#     image:
#       repository: fdb-worker
#       tag: ""
#     pool: worker_pool
#     replicas: 5
#     config:
#       type: remote
#       host: svc001.alpsb.cscs.ch
#       port: 9000
workerPools: {}

# ── NATS JetStream (persistence backend) ──────────────────────────────────────
# Bundled official NATS subchart. When enabled, the chart deploys a NATS server
# with JetStream and wires it into the bits persistence config automatically.
nats:
  enabled: true
  config:
    jetstream:
      enabled: true
      fileStore:
        enabled: true
        pvc:
          enabled: true
          size: 10Gi
      memoryStore:
        enabled: true
        maxSize: 256Mi

# ── BOBS (temporary spool storage) ────────────────────────────────────────────
# Bundled subchart from ecmwf/bobs. Workers write results here; clients read
# via redirect URLs.
bobs:
  enabled: true
  image:
    repository: bobs
    tag: latest
    pullPolicy: Always
  persistence:
    enabled: true
    size: 10Gi

# ── Authentication (auth-o-tron gateway) ──────────────────────────────────────
# When set, all API endpoints require valid credentials.
# /api/v2/health remains public (used by k8s probes).
# authentication:
#   url: "http://auth-o-tron:8080"
#   secret: ""              # plaintext fallback (prefer secretName)
#   secretName: ""          # K8s Secret holding the JWT signing secret
#   secretKey: auth-secret  # key inside the Secret
#   timeout_ms: 3000

# ── Ingress ───────────────────────────────────────────────────────────────────
# Host is constructed as {{ hostPrefix }}.{{ domain }}.
ingress:
  enabled: false
  className: nginx
  hostPrefix: polytope
  domain: ""
  annotations:
    nginx.org/lb-method: "hash $http_authorization$proxy_protocol_addr consistent"
  tls: []
