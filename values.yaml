nameOverride: ""
fullnameOverride: ""

global:
  # Override ALL image registries in the chart (e.g. for air-gapped environments).
  imageRegistry: ""
  # Pull secrets propagated to all pods, including subcharts (bobs, etc.).
  imagePullSecrets: []
  # When set, the chart creates a kubernetes.io/dockerconfigjson Secret and
  # automatically adds it to imagePullSecrets on every pod (including subcharts).
  imageCredentials: {}
    # registry: eccr.ecmwf.int
    # username: robot$polytope+polytope-pull
    # password: changeme

# Additional pull secrets for the parent chart only (merged with global).
imagePullSecrets: []

# ── Frontend (broker) ─────────────────────────────────────────────────────────
frontend:
  image:
    repository: polytope-server
    tag: ""
    pullPolicy: Always
  host: "0.0.0.0"
  port: 3000
  brokerPort: 9001
  replicas: 1
  persist_after_ms: 10000
  poll_timeout_ms: 30000
  persist_guard_ms: 1000
  resources: {}
  podAnnotations: {}

# ── Broker ────────────────────────────────────────────────────────────────────
# Targets, routes, checks, and transforms for the bits routing engine.
# persistence and internal_poll_base_url are injected by the chart.
broker:
  targets:
    worker_pool:
      type: remote
      dispatcher:
        queue: cost_weighted
        executor:
          type: remote_pool
          heartbeat_timeout_secs: 60
  routes:
    - default:
        - target::worker_pool

# ── Schedule ──────────────────────────────────────────────────────────────────
# Raw schedule XML for the bits-ecmwf schedule_released check.
# When set, the chart mounts it and injects the path into routing.checks
# automatically — no internal paths required in config.
schedule: ""

# ── Worker pools ──────────────────────────────────────────────────────────────
# Each key produces a Deployment (+ optional ConfigMap when config is set).
# The chart handles mounting and CLI args internally.
# `pool` is the broker target name — workers connect to /pool/work on the broker.
#
# workerPools:
#   fdb-alps:
#     image:
#       repository: fdb-worker
#       tag: ""
#     pool: worker_pool
#     replicas: 5
#     config:
#       type: remote
#       host: svc001.alpsb.cscs.ch
#       port: 9000
workerPools: {}

# ── NATS JetStream (persistence backend) ──────────────────────────────────────
# Bundled official NATS subchart. When enabled, the chart deploys a NATS server
# with JetStream and wires it into the bits persistence config automatically.
nats:
  enabled: true
  config:
    jetstream:
      enabled: true
      fileStore:
        enabled: true
        pvc:
          enabled: true
          size: 10Gi
      memoryStore:
        enabled: true
        maxSize: 256Mi

# ── BOBS (temporary spool storage) ────────────────────────────────────────────
# Bundled subchart from ecmwf/bobs. Workers write results here; clients read
# via redirect URLs.
bobs:
  enabled: true
  image:
    repository: bobs
    tag: latest
    pullPolicy: Always
  persistence:
    enabled: true
    size: 10Gi

# ── Authentication (auth-o-tron gateway) ──────────────────────────────────────
# When set, all API endpoints require valid credentials.
# /api/v2/health remains public (used by k8s probes).
# authentication:
#   url: "http://auth-o-tron:8080"
#   secret: ""              # plaintext fallback (prefer secretName)
#   secretName: ""          # K8s Secret holding the JWT signing secret
#   secretKey: auth-secret  # key inside the Secret
#   timeout_ms: 3000

# ── Ingress ───────────────────────────────────────────────────────────────────
# Host is constructed as {{ hostPrefix }}.{{ domain }}.
ingress:
  enabled: false
  className: nginx
  hostPrefix: polytope
  domain: ""
  annotations:
    nginx.org/lb-method: "hash $http_authorization$proxy_protocol_addr consistent"
  tls: []
