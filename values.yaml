nameOverride: ""
fullnameOverride: ""

global:
  # Override ALL image registries in the chart (e.g. for air-gapped environments).
  imageRegistry: ""

imagePullSecrets: []

# When set, the chart creates a kubernetes.io/dockerconfigjson Secret called
# "polytope-registry-cred".  You still need to list the secret name in
# imagePullSecrets above (or in your per-environment config overlay).
imageCredentials: {}
  # registry: eccr.ecmwf.int
  # username: robot$polytope+polytope-pull
  # password: changeme

# ── Frontend (broker) ─────────────────────────────────────────────────────────
frontend:
  image:
    repository: polytope-server
    tag: ""
    pullPolicy: IfNotPresent
  host: "0.0.0.0"
  port: 3000
  brokerPort: 9001
  replicas: 1
  persist_after_ms: 10000
  poll_timeout_ms: 30000
  persist_guard_ms: 1000
  resources: {}
  podAnnotations: {}

# ── Broker ────────────────────────────────────────────────────────────────────
# Targets, routes, checks, and transforms for the bits routing engine.
# tikv endpoints and internal_poll_base_url are injected by the chart.
broker:
  targets:
    worker_pool:
      type: remote
      dispatcher:
        queue: cost_weighted
        executor:
          type: remote_pool
          heartbeat_timeout_secs: 60
  routes:
    - default:
        - target::worker_pool

# ── Schedule ──────────────────────────────────────────────────────────────────
# Raw schedule XML for the bits-ecmwf schedule_released check.
# When set, the chart mounts it and injects the path into routing.checks
# automatically — no internal paths required in config.
schedule: ""

# ── Worker pools ──────────────────────────────────────────────────────────────
# Each key produces a Deployment (+ ConfigMap when config or deliveryConfig is set).
# All config is merged into a single YAML file mounted at /etc/polytope-worker/config.yaml.
# `pool` is the broker target name — workers connect to /pool/work on the broker.
#
# workerPools:
#   fdb-alps:
#     image:
#       repository: fdb-worker
#       tag: ""
#     pool: worker_pool
#     replicas: 5
#     config:
#       fdb:
#         type: remote
#         host: svc001.alpsb.cscs.ch
#         port: 9000
#     deliveryConfig:
#       delivery_type: bobs
#       bobs_index: 0   # selects bobs-0; bobs_url and bobs_public_url are auto-filled from the ingress
workerPools: {}

# ── TiKV (raw StatefulSets — no operator) ─────────────────────────────────────
tikv:
  enabled: true
  pd:
    replicas: 3
    image: pingcap/pd:v8.5.0
    storage: 10Gi
    storageClassName: ""
    resources: {}
  tikv:
    replicas: 3
    image: pingcap/tikv:v8.5.0
    storage: 100Gi
    storageClassName: ""
    resources: {}

# ── Authentication (auth-o-tron gateway) ──────────────────────────────────────
# When set, all API endpoints require valid credentials.
# /api/v2/health remains public (used by k8s probes).
# authentication:
#   url: "http://auth-o-tron:8080"
#   secret: ""              # plaintext fallback (prefer secretName)
#   secretName: ""          # K8s Secret holding the JWT signing secret
#   secretKey: auth-secret  # key inside the Secret
#   timeout_ms: 3000

# ── Ingress ───────────────────────────────────────────────────────────────────
# Host is constructed as {{ hostPrefix }}.{{ domain }}.
ingress:
  enabled: false
  className: nginx
  hostPrefix: polytope
  domain: ""
  annotations:
    nginx.org/lb-method: "hash $http_authorization$proxy_protocol_addr consistent"
  tls: []

# ── BOBS (result spool storage) ──────────────────────────────────────────────
bobs:
  enabled: false

# ── SeaweedFS S3 storage ─────────────────────────────────────────────────────
# Requires mysql to be enabled alongside for the filer database.
# Shared anchors keep credentials in sync between mysql and seaweedfs.
mysql_service_name: &mysql_svc_name ""
filer_database: &filer_database ""
secretName: &s3_secret_name ""
s3_access_key: &s3_access_key ""
s3_secret_key: &s3_secret_key ""

mysql:
  enabled: false  # activate together with seaweedfs
  fullnameOverride: *mysql_svc_name
  image:
    repository: bitnamilegacy/mysql
  startdbScripts:
    init.sql: |
      CREATE TABLE IF NOT EXISTS `filemeta` (
        `dirhash`   BIGINT NOT NULL       COMMENT 'first 64 bits of MD5 hash value of directory field',
        `name`      VARCHAR(766) NOT NULL COMMENT 'directory or file name',
        `directory` TEXT NOT NULL         COMMENT 'full path to parent directory',
        `meta`      LONGBLOB,
        PRIMARY KEY (`dirhash`, `name`)
      ) DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_bin;
  primary:
    service:
      type: ClusterIP
    persistence:
      enabled: true
      size: "200Gi"
    resources:
      requests:
        memory: "4Gi"
        cpu: "3000m"
      limits:
        memory: "16Gi"
        cpu: "8000m"
  auth:
    defaultAuthenticationPlugin: caching_sha2_password
    rootPassword: ""
    database: *filer_database
    username: ""
    password: ""
  networkPolicy:
    enabled: false

seaweedfs:
  enabled: false  # activate together with mysql
  serviceMonitor:
    enabled: true
  createS3Secret:
    enabled: true
    secretName: *s3_secret_name
  global:
    createClusterRole: false
    enableReplication: false
  master:
    enabled: true
    replicas: 1
    volumePreallocate: true
    volumeSizeLimitMB: 30000
    logs:
      type: "emptyDir"
  volume:
    enabled: true
    replicas: 1
    minFreeSpacePercent: 7
    index: leveldbLarge
    dataDirs:
      - name: data
        type: "persistentVolumeClaim"
        size: 1Ti
        maxVolumes: 29
  filer:
    enabled: true
    replicas: 1
    enablePVC: true
    storage: 50Gi
    maxMB: 1000
    logs:
      type: "emptyDir"
    data:
      type: "persistentVolumeClaim"
      size: "50Gi"
    s3:
      enabled: true
      port: 9000
      allowEmptyFolder: true
      enableAuth: true
      existingConfigSecret: *s3_secret_name
      createBuckets:
        - name: default
          anonymousRead: true
      credentials:
        anvAdmin:
          accessKey: *s3_access_key
          secretKey: *s3_secret_key
    extraEnvironmentVars:
      WEED_LEVELDB2_ENABLED: "false"
      WEED_MYSQL_ENABLED: "true"
      WEED_MYSQL_DATABASE: *filer_database
      WEED_MYSQL_HOSTNAME: *mysql_svc_name
