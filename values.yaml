nameOverride: ""
fullnameOverride: ""

global:
  # Override ALL image registries in the chart (e.g. for air-gapped environments).
  imageRegistry: ""

imagePullSecrets: []

# When set, the chart creates a kubernetes.io/dockerconfigjson Secret called
# "polytope-registry-cred".  You still need to list the secret name in
# imagePullSecrets above (or in your per-environment config overlay).
imageCredentials: {}
  # registry: eccr.ecmwf.int
  # username: robot$polytope+polytope-pull
  # password: changeme

# ── Frontend (broker) ─────────────────────────────────────────────────────────
frontend:
  image:
    repository: polytope-server
    tag: ""
    pullPolicy: IfNotPresent
  host: "0.0.0.0"
  port: 3000
  brokerPort: 9001
  replicas: 1
  persist_after_ms: 10000
  poll_timeout_ms: 30000
  persist_guard_ms: 1000
  resources: {}
  podAnnotations: {}

# ── Broker ────────────────────────────────────────────────────────────────────
# Targets, routes, checks, and transforms for the bits routing engine.
# tikv endpoints and internal_poll_base_url are injected by the chart.
broker:
  targets:
    worker_pool:
      type: remote
      dispatcher:
        queue: cost_weighted
        executor:
          type: remote_pool
          heartbeat_timeout_secs: 60
  routes:
    - default:
        - target::worker_pool

# ── Schedule ──────────────────────────────────────────────────────────────────
# Raw schedule XML for the bits-ecmwf schedule_released check.
# When set, the chart mounts it and injects the path into routing.checks
# automatically — no internal paths required in config.
schedule: ""

# ── Worker pools ──────────────────────────────────────────────────────────────
# Each key produces a Deployment (+ optional ConfigMap when config is set).
# The chart handles mounting and CLI args internally.
# `pool` is the broker target name — workers connect to /pool/work on the broker.
#
# workerPools:
#   fdb-alps:
#     image:
#       repository: fdb-worker
#       tag: ""
#     pool: worker_pool
#     replicas: 5
#     config:
#       type: remote
#       host: svc001.alpsb.cscs.ch
#       port: 9000
#     deliveryConfig:
#       delivery_type: bobs
#       bobs_index: 0   # selects bobs-0; bobs_url and bobs_public_url are auto-filled from the ingress
workerPools: {}

# ── TiKV (raw StatefulSets — no operator) ─────────────────────────────────────
tikv:
  enabled: true
  pd:
    replicas: 3
    image: pingcap/pd:v8.5.0
    storage: 10Gi
    storageClassName: ""
    resources: {}
  tikv:
    replicas: 3
    image: pingcap/tikv:v8.5.0
    storage: 100Gi
    storageClassName: ""
    resources: {}

# ── Ingress ───────────────────────────────────────────────────────────────────
# Host is constructed as {{ hostPrefix }}.{{ domain }}.
ingress:
  enabled: false
  className: nginx
  hostPrefix: polytope
  domain: ""
  annotations:
    nginx.org/lb-method: "hash $http_authorization$proxy_protocol_addr consistent"
  tls: []

# ── BOBS (result spool storage) ──────────────────────────────────────────────
bobs:
  enabled: false
  replicaCount: 1
  image:
    repository: bobs
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  config:
    host: "0.0.0.0"
    port: 3000
    data_dir: "/var/lib/bobs"
    page_size: 4096
    max_cache_bytes: 1048576
    writer_inactivity_timeout_secs: 300
    reader_done_ttl_secs: 60
    unread_ttl_secs: 3600
    cleanup_sweep_interval_secs: 30
    long_poll_timeout_ms: 25000
    bob_id: "bobs"
    host_prefix: ""
    domain: ""
  headlessService:
    enabled: true
    name: bobs-svc
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  ingress:
    enabled: false
    className: nginx
    host: ""
    annotations: {}
    tls: []
